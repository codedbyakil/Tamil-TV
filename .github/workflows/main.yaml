name: Auto-Update Main M3U

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  build-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq dos2unix

      - name: Verify other.m3u exists
        run: |
          FILE=".github/workflows/other.m3u"
          [ -f "$FILE" ] || { echo "❌ other.m3u missing"; exit 1; }
          sed -i '1s/^\xEF\xBB\xBF//' "$FILE"
          dos2unix "$FILE" 2>/dev/null || sed -i 's/\r$//' "$FILE"

      - name: Download VOD
        id: vod
        run: |
          curl -sfL "https://raw.githubusercontent.com/codedbyakil/VOD/refs/heads/main/vod.m3u" -o vod.m3u || exit 1
          sed -i '1s/^\xEF\xBB\xBF//' vod.m3u
          dos2unix vod.m3u 2>/dev/null || sed -i 's/\r$//' vod.m3u
          echo "vod_count=$(grep -c '^#EXTINF:' vod.m3u || echo 0)" >> $GITHUB_OUTPUT

      - name: Build main.m3u
        id: build
        run: |
          OUT="main.m3u"
          OTHER=".github/workflows/other.m3u"
          VOD="vod.m3u"

          echo "#EXTM3U" > "$OUT"

          JSON=$(curl -sL "https://noisy-truth-6766.streamstar18.workers.dev")
          echo "$JSON" | jq empty || { echo "❌ Invalid JSON"; exit 1; }

          echo "# === LIVE (AUTO GROUP OR FALLBACK) ===" >> "$OUT"

          echo "$JSON" | jq -r '
            def channels:
              if type=="array" then .
              elif type=="object" then
                if has("channels") then .channels
                elif has("data") then .data
                elif has("list") then .list
                else [.[]]
                end
              else [] end;

            channels as $all |

            # detect if group/category exists
            (any($all[]; has("group") or has("category"))) as $hasGroup |

            # fallback list
            [
              "Sun TV HD","Sun Music HD","Sun Life","Adithya TV","KTV HD",
              "Star Vijay HD","Vijay Super HD","Colors Tamil","Jaya TV HD",
              "Jaya Plus","Jaya Max","J Movies","Polimer TV","Vasanth TV",
              "Kalaignar TV","Raj TV","Disney","Disney Junior","Hungama TV",
              "Super Hungama","Sonic Tamil","Nick Tamil","Nickelodeon Jr.",
              "Pogo","Cartoon Network","CN HD+ Tamil","Discovery Kids Tamil",
              "D Tamil","History HD"
            ] as $list |

            if $hasGroup then
              # ✅ GROUP MODE
              $all[]
              | (.group // .category // "") as $grp
              | select($grp | ascii_downcase | test("tamil|kids"))

            else
              # ✅ FALLBACK MODE
              $list[] as $target
              | ($all | map(select(
                  (.name // .title // "") | ascii_downcase == ($target | ascii_downcase)
                )) | .[0])

            end |

            select(type=="object") |

            # -------- COMMON PARSING --------
            (.name // .title // "Unknown") as $name |
            (.id // .tvg_id // "") as $id |
            (.logo // .tvg_logo // "") as $logo |

            (.mpd_url // .link // .url // .stream_url // "") as $raw |
            (.license_url // .drmLicense // "") as $license |
            (.headers.cookie // .cookie // "") as $cookie |
            (.drmScheme // .drm_scheme // .drm // "") as $drmScheme |

            ($raw | split("|")) as $p |
            ($p[0]) as $url |
            ($p[1] // "") as $drmPart |

            (if ($drmPart | test("drmScheme="))
              then ($drmPart | capture("drmScheme=(?<d>[^&]+)") | .d)
              else $drmScheme end) as $scheme |

            select($url != "") |

            "#EXTINF:-1 " +
              (if ($id|length)>0 then "tvg-id=\"\($id)\" " else "" end) +
              "group-title=\"" + ((.group // .category // "Live")) + "\" " +
              (if ($logo|length)>0 then "tvg-logo=\"\($logo)\" " else "" end) +
              ",\($name | gsub(","; "\\,"))",

            (if $scheme=="clearkey" and ($license|length)>0 then
              "#KODIPROP:inputstream.adaptive.license_type=clearkey\n#KODIPROP:inputstream.adaptive.license_key=\($license)"
            else empty end),

            "#EXTVLCOPT:http-user-agent=plaYtv/7.1.5",

            (if ($cookie|length)>0 then
              "#EXTHTTP:{\"cookie\":\"\($cookie | gsub("\""; "\\\""))\"}"
            else empty end),

            $url,
            ""
          ' >> "$OUT"

          # STATIC
          echo "# === STATIC ===" >> "$OUT"
          awk '!/^#EXTM3U/' "$OTHER" >> "$OUT"

          # VOD
          echo "# === VOD ===" >> "$OUT"
          awk '
            /^#EXTINF:/ {
              if ($0 !~ /group-title=/)
                sub("#EXTINF:-1", "#EXTINF:-1 group-title=\"VOD\"")
            }
            !/^#EXTM3U/
          ' "$VOD" >> "$OUT"

          TOTAL=$(grep -c '^#EXTINF' "$OUT" || echo 0)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          echo "✅ Built main.m3u ($TOTAL entries)"

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add main.m3u

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto update main.m3u ($(date -u '+%Y-%m-%d %H:%M'))"
          git push
