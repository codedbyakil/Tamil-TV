name: Auto-Update Tamil M3U

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate tamil.m3u
        run: |
          echo "📥 Fetching JSON..."

          JSON_URL="https://noisy-truth-6766.streamstar18.workers.dev"
          JSON=$(curl -sL "$JSON_URL") || { echo "❌ Fetch failed"; exit 1; }

          if [ -z "$JSON" ] || [ "${JSON:0:1}" = "<" ]; then
            echo "❌ Invalid response"
            exit 1
          fi

          echo "#EXTM3U" > tamil.m3u

          echo "$JSON" | jq -r '
            # -------- NORMALIZE --------
            def channels:
              if type == "array" then .
              elif type == "object" then
                if has("channels") then .channels
                elif has("data") then .data
                elif has("list") then .list
                else [.[]]
                end
              else []
              end;

            # -------- TARGET LIST --------
            [
              "Sun TV HD","Sun Music HD","Sun Life","Adithya TV","KTV HD",
              "Star Vijay HD","Vijay Super HD","Colors Tamil","Jaya TV HD",
              "Jaya Plus","Jaya Max","J Movies","Polimer TV","Vasanth TV",
              "Kalaignar TV","Raj TV","Disney","Disney Junior","Hungama TV",
              "Super Hungama","Sonic Tamil","Nick Tamil","Nickelodeon Jr.",
              "Pogo","Cartoon Network","CN HD+ Tamil","Discovery Kids Tamil",
              "D Tamil","History HD"
            ] as $list |

            channels as $all |

            $list[] as $target |

            # -------- MATCH CHANNEL --------
            ($all | map(select(
              (.name // .title // "") | ascii_downcase == ($target | ascii_downcase)
            )) | .[0]) as $c |

            if ($c | type == "object") then

              # -------- FIELD EXTRACTION (DUAL FORMAT) --------
              ($c.name // $c.title // $target) as $name |
              ($c.id // $c.tvg_id // "") as $id |
              ($c.logo // $c.tvg_logo // "") as $logo |

              ($c.mpd_url // $c.link // $c.url // $c.stream_url // "") as $raw |

              ($c.license_url // $c.drmLicense // "") as $license |

              ($c.headers.cookie // $c.cookie // "") as $cookie |

              ($c.drmScheme // $c.drm_scheme // $c.drm // "") as $drmScheme |

              # -------- SPLIT URL --------
              ($raw | split("|")) as $p |
              ($p[0]) as $url |
              ($p[1] // "") as $drmPart |

              # -------- SAFE DRM DETECTION --------
              (if ($drmPart | test("drmScheme="))
                then ($drmPart | capture("drmScheme=(?<d>[^&]+)") | .d)
                else $drmScheme
               end) as $scheme |

              if ($url | length) > 0 then

                "#EXTINF:-1 " +
                  (if ($id|length)>0 then "tvg-id=\"\($id)\" " else "" end) +
                  "group-title=\"Tamil\" " +
                  (if ($logo|length)>0 then "tvg-logo=\"\($logo)\" " else "" end) +
                  ",\($name | gsub(","; "\\,"))",

                # DRM support
                (if $scheme == "clearkey" and ($license|length)>0 then
                  "#KODIPROP:inputstreamaddon=inputstream.adaptive\n#KODIPROP:inputstream.adaptive.manifest_type=mpd\n#KODIPROP:inputstream.adaptive.license_type=clearkey\n#KODIPROP:inputstream.adaptive.license_key=\($license)"
                else empty end),

                "#EXTVLCOPT:http-user-agent=plaYtv/7.1.5",

                (if ($cookie|length)>0 then
                  "#EXTHTTP:{\"cookie\":\"\($cookie | gsub("\""; "\\\""))\"}"
                else empty end),

                $url,
                ""

              else empty end

            else empty end
          ' >> tamil.m3u

          TOTAL=$(grep -c "^#EXTINF" tamil.m3u || echo 0)

          echo "✅ tamil.m3u created: $TOTAL / 31 channels found"

          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ No matching channels found"
            exit 1
          fi

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tamil.m3u

          if git diff --cached --quiet; then
            echo "➡️ No changes"
            exit 0
          fi

          git commit -m "Auto-update Tamil M3U: $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
